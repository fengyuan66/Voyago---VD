services:
  - type: web
    name: voyago-api
    runtime: node
    rootDir: voyago
    plan: free
    buildCommand: npm ci
    startCommand: npm run api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: voyago_state
      - key: HACKCLUB_API_KEY
        sync: false
      - key: HACKCLUB_BASE_URL
        value: https://ai.hackclub.com/proxy/v1
      - key: HACKCLUB_MODEL
        value: gpt-4o-mini

  - type: web
    name: transiter-api
    runtime: python
    rootDir: transiter/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TRANSITER_ROUTER_MODE
        value: auto
      - key: TRANSITER_CORS_ORIGINS
        value: "*"
      - key: TRANSITER_WALKING_STRATEGY
        value: fallback
